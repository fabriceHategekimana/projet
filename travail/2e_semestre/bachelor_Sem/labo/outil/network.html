<head>

<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.16.1/vis-network.min.js"> </script>
<center>
<h1></h1>
</center>

<style type="text/css">

        #mynetwork {
            width: 100%;
            height: 100%;
            background-color: #333333;
            border: 1px solid lightgray;
            position: relative;
            float: left;
        }

        

        

        
</style>

</head>

<body>
<div id = "mynetwork"></div>


<script type="text/javascript">

    // initialize global variables.
    var edges;
    var nodes;
    var network; 
    var container;
    var options, data;

    
    // This method is responsible for drawing the graph, returns the drawn network
    function drawGraph() {
        var container = document.getElementById('mynetwork');
        
        

        // parsing and collecting nodes and edges from the python
        nodes = new vis.DataSet([{"color": "blue", "font": {"color": "white"}, "id": "mul(7,fact(sub(7,1)))", "label": "mul(7,fact(sub(7,1)))", "shape": "dot"}, {"color": "blue", "font": {"color": "white"}, "id": "fact(7)", "label": "fact(7)", "shape": "dot"}, {"color": "yellow", "font": {"color": "white"}, "id": "N-\u003eP;O-\u003eQ--mul(P;Q)", "label": "N-\u003eP;O-\u003eQ--mul(P;Q)", "shape": "dot"}, {"color": "blue", "font": {"color": "white"}, "id": "5040", "label": "5040", "shape": "dot"}, {"color": "yellow", "font": {"color": "white"}, "id": "N\u003e1--fact(N)-\u003emul(N,fact(sub(N,1)))", "label": "N\u003e1--fact(N)-\u003emul(N,fact(sub(N,1)))", "shape": "dot"}, {"color": "yellow", "font": {"color": "white"}, "id": "--fact(1)-\u003e1", "label": "--fact(1)-\u003e1", "shape": "dot"}, {"color": "blue", "font": {"color": "white"}, "id": "error", "label": "error", "shape": "dot"}]);
        edges = new vis.DataSet([{"arrows": "to", "color": "#ed6e5", "from": "fact(7)", "label": " ", "to": "--fact(1)-\u003e1"}, {"arrows": "to", "color": "#ed6e5", "from": "--fact(1)-\u003e1", "label": " ", "to": "error"}, {"arrows": "to", "color": "#ed6e5", "from": "fact(7)", "label": " ", "to": "N\u003e1--fact(N)-\u003emul(N,fact(sub(N,1)))"}, {"arrows": "to", "color": "#ed6e5", "from": "N\u003e1--fact(N)-\u003emul(N,fact(sub(N,1)))", "label": " ", "to": "mul(7,fact(sub(7,1)))"}, {"arrows": "to", "color": "#ed6e5", "from": "mul(7,fact(sub(7,1)))", "label": " ", "to": "N-\u003eP;O-\u003eQ--mul(P;Q)"}, {"arrows": "to", "color": "#ed6e5", "from": "N-\u003eP;O-\u003eQ--mul(P;Q)", "label": " ", "to": "5040"}]);

        // adding nodes and edges to the graph
        data = {nodes: nodes, edges: edges};

        var options = {"manipulation": {"enabled": true}, "interaction": {"multiselect": true, "navigationButtons": true}, "configure": {"enabled": true, "filter": "layout,physics", "showButton": true}, "edges": {"smooth": {"enabled": false}}, "layout": {"hierarchical": {"enabled": true, "sortMethod": "directed"}}, "physics": {"hierarchicalRepulsion": {"centralGravity": 0, "springLength": 50, "springConstant": 0.045, "nodeDistance": 190}, "minVelocity": 0.75, "solver": "hierarchicalRepulsion"}};
        
        

        

        network = new vis.Network(container, data, options);
	 
        


        

        return network;

    }

    drawGraph();

</script>
</body>
</html>
