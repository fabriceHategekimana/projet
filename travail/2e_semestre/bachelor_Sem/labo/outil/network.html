<body>
<div id = "mynetwork"></div>


<script type="text/javascript">

    // initialize global variables.
    var edges;
    var nodes;
    var network; 
    var container;
    var options, data;

    
    // This method is responsible for drawing the graph, returns the drawn network
    function drawGraph() {
        var container = document.getElementById('mynetwork');
        
        

        // parsing and collecting nodes and edges from the python
        nodes = new vis.DataSet([{"color": "blue", "font": {"color": "white"}, "id": "\u003c0,0\u003e", "label": "\u003c0,0\u003e", "shape": "dot"}, {"color": "yellow", "font": {"color": "white"}, "id": "r2", "label": "sub(X,1)-\u003eXp--\u003cX,Y\u003egauche-\u003e\u003cXp,Y\u003e", "shape": "dot"}, {"color": "green", "font": {"color": "white"}, "id": "p4", "label": "sub(0,1)", "shape": "dot"}, {"color": "blue", "font": {"color": "white"}, "id": "sub(0,1)", "label": "sub(0,1)", "shape": "dot"}, {"color": "blue", "font": {"color": "white"}, "id": "\u003c-1,0\u003e", "label": "\u003c-1,0\u003e", "shape": "dot"}, {"color": "yellow", "font": {"color": "white"}, "id": "r8", "label": "sub(Y,1)-\u003eYp--\u003cX,Y\u003ebas-\u003e\u003cX,Yp\u003e", "shape": "dot"}, {"color": "green", "font": {"color": "white"}, "id": "p10", "label": "sub(0,1)", "shape": "dot"}, {"color": "blue", "font": {"color": "white"}, "id": "\u003c-1,-1\u003e", "label": "\u003c-1,-1\u003e", "shape": "dot"}, {"color": "yellow", "font": {"color": "white"}, "id": "r14", "label": "add(Y,1)-\u003eYp--\u003cX,Y\u003ehaut-\u003e\u003cX,Yp\u003e", "shape": "dot"}, {"color": "green", "font": {"color": "white"}, "id": "p16", "label": "add(-1,1)", "shape": "dot"}, {"color": "blue", "font": {"color": "white"}, "id": "add(-1,1)", "label": "add(-1,1)", "shape": "dot"}, {"color": "yellow", "font": {"color": "white"}, "id": "r20", "label": "add(Y,1)-\u003eYp--\u003cX,Y\u003ehaut-\u003e\u003cX,Yp\u003e", "shape": "dot"}, {"color": "green", "font": {"color": "white"}, "id": "p22", "label": "add(0,1)", "shape": "dot"}, {"color": "blue", "font": {"color": "white"}, "id": "add(0,1)", "label": "add(0,1)", "shape": "dot"}, {"color": "blue", "font": {"color": "white"}, "id": "\u003c-1,1\u003e", "label": "\u003c-1,1\u003e", "shape": "dot"}]);

        // adding nodes and edges to the graph
        data = {nodes: nodes, edges: edges};

        var options = {"manipulation": {"enabled": true}, "interaction": {"multiselect": true, "navigationButtons": true}, "configure": {"enabled": true, "filter": "layout,physics", "showButton": true}, "edges": {"smooth": {"enabled": false}}, "layout": {"hierarchical": {"enabled": true, "sortMethod": "directed"}}, "physics": {"hierarchicalRepulsion": {"centralGravity": 0, "springLength": 50, "springConstant": 0.045, "nodeDistance": 190}, "minVelocity": 0.75, "solver": "hierarchicalRepulsion"}};
        
        

        

        network = new vis.Network(container, data, options);
	 
        


        

        return network;

    }

    drawGraph();
