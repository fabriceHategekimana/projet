<html>
<head>

<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.16.1/vis-network.min.js"> </script>
<center>
<h1></h1>
</center>

<style type="text/css">

        #mynetwork {
            width: 70%;
            height: 100%;
            background-color: #333333;
            border: 1px solid lightgray;
            position: relative;
            float: left;
        }

        

        
        #config {
            float: left;
            width: 400px;
            height: 600px;
        }
        

        
</style>

</head>

<body>
<div id = "mynetwork"></div>


<div id = "config"></div>

<script type="text/javascript">

    // initialize global variables.
    var edges;
    var nodes;
    var network; 
    var container;
    var options, data;

    
    // This method is responsible for drawing the graph, returns the drawn network
    function drawGraph() {
        var container = document.getElementById('mynetwork');
        
        

        // parsing and collecting nodes and edges from the python
        nodes = new vis.DataSet([{"font": {"color": "white"}, "id": "emy", "label": "emy", "shape": "dot"}, {"font": {"color": "white"}, "id": "lenora", "label": "lenora", "shape": "dot"}, {"font": {"color": "white"}, "id": "huugo", "label": "huugo", "shape": "dot"}, {"font": {"color": "white"}, "id": "rebel", "label": "rebel", "shape": "dot"}, {"font": {"color": "white"}, "id": "hugo", "label": "hugo", "shape": "dot"}, {"font": {"color": "white"}, "id": "zhuan", "label": "zhuan", "shape": "dot"}, {"font": {"color": "white"}, "id": "francois", "label": "francois", "shape": "dot"}, {"font": {"color": "white"}, "id": "arthur", "label": "arthur", "shape": "dot"}, {"font": {"color": "white"}, "id": "groupePrincipal", "label": "groupePrincipal", "shape": "dot"}, {"font": {"color": "white"}, "id": "jordan", "label": "jordan", "shape": "dot"}, {"font": {"color": "white"}, "id": "rachel", "label": "rachel", "shape": "dot"}, {"font": {"color": "white"}, "id": "bourgeoisie", "label": "bourgeoisie", "shape": "dot"}, {"font": {"color": "white"}, "id": "mutant", "label": "mutant", "shape": "dot"}, {"font": {"color": "white"}, "id": "groupe", "label": "groupe", "shape": "dot"}, {"font": {"color": "white"}, "id": "hyun", "label": "hyun", "shape": "dot"}, {"font": {"color": "white"}, "id": "leon", "label": "leon", "shape": "dot"}, {"font": {"color": "white"}, "id": "tiago", "label": "tiago", "shape": "dot"}]);
        edges = new vis.DataSet([{"arrows": "to", "color": "#9128e3", "from": "emy", "label": "dans", "to": "groupePrincipal"}, {"arrows": "to", "color": "#9128e3", "from": "francois", "label": "dans", "to": "groupePrincipal"}, {"arrows": "to", "color": "#9128e3", "from": "tiago", "label": "dans", "to": "groupePrincipal"}, {"arrows": "to", "color": "#9128e3", "from": "hyun", "label": "dans", "to": "groupePrincipal"}, {"arrows": "to", "color": "#9128e3", "from": "lenora", "label": "dans", "to": "groupePrincipal"}, {"arrows": "to", "color": "#9128e3", "from": "rachel", "label": "dans", "to": "rebel"}, {"arrows": "to", "color": "#9128e3", "from": "leon", "label": "dans", "to": "rebel"}, {"arrows": "to", "color": "#9128e3", "from": "hugo", "label": "dans", "to": "rebel"}, {"arrows": "to", "color": "#9128e3", "from": "zhuan", "label": "dans", "to": "rebel"}, {"arrows": "to", "color": "#9128e3", "from": "arthur", "label": "dans", "to": "bourgeoisie"}, {"arrows": "to", "color": "#9128e3", "from": "rachel", "label": "dans", "to": "mutant"}, {"arrows": "to", "color": "#9128e3", "from": "leon", "label": "dans", "to": "mutant"}, {"arrows": "to", "color": "#9128e3", "from": "huugo", "label": "dans", "to": "mutant"}, {"arrows": "to", "color": "#9128e3", "from": "jordan", "label": "dans", "to": "mutant"}, {"arrows": "to", "color": "#9128e3", "from": "hugo", "label": "dans", "to": "mutant"}, {"arrows": "to", "color": "#4d5b7c", "from": "groupePrincipal", "label": "est", "to": "groupe"}, {"arrows": "to", "color": "#4d5b7c", "from": "groupePrincipal", "label": "est", "to": "groupe"}, {"arrows": "to", "color": "#4d5b7c", "from": "groupePrincipal", "label": "est", "to": "groupe"}, {"arrows": "to", "color": "#4d5b7c", "from": "groupePrincipal", "label": "est", "to": "groupe"}, {"arrows": "to", "color": "#4d5b7c", "from": "groupePrincipal", "label": "est", "to": "groupe"}, {"arrows": "to", "color": "#4d5b7c", "from": "rebel", "label": "est", "to": "groupe"}, {"arrows": "to", "color": "#4d5b7c", "from": "rebel", "label": "est", "to": "groupe"}, {"arrows": "to", "color": "#4d5b7c", "from": "rebel", "label": "est", "to": "groupe"}, {"arrows": "to", "color": "#4d5b7c", "from": "rebel", "label": "est", "to": "groupe"}, {"arrows": "to", "color": "#4d5b7c", "from": "bourgeoisie", "label": "est", "to": "groupe"}, {"arrows": "to", "color": "#4d5b7c", "from": "mutant", "label": "est", "to": "groupe"}, {"arrows": "to", "color": "#4d5b7c", "from": "mutant", "label": "est", "to": "groupe"}, {"arrows": "to", "color": "#4d5b7c", "from": "mutant", "label": "est", "to": "groupe"}, {"arrows": "to", "color": "#4d5b7c", "from": "mutant", "label": "est", "to": "groupe"}, {"arrows": "to", "color": "#4d5b7c", "from": "mutant", "label": "est", "to": "groupe"}]);

        // adding nodes and edges to the graph
        data = {nodes: nodes, edges: edges};

        var options = {
    "configure": {
        "enabled": true,
        "filter": [
            "layout",
            "edges"
        ]
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": false,
            "type": "continuous"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "barnesHut": {
            "avoidOverlap": 0,
            "centralGravity": 0.0,
            "damping": 0.09,
            "gravitationalConstant": -20000,
            "springConstant": 0.01,
            "springLength": 73
        },
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};
        
        

        
        // if this network requires displaying the configure window,
        // put it in its div
        options.configure["container"] = document.getElementById("config");
        

        network = new vis.Network(container, data, options);
	 
        


        

        return network;

    }

    drawGraph();

</script>
</body>
</html>
