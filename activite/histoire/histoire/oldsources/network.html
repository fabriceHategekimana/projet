<html>
<head>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	<script src="app.js"></script>

    <style type="text/css">
        #mynetwork {
            width: 100%;
            height: 50%;
            border: 1px solid lightgray;
        }

		.myterminal {
			background-color: #222222;
			border: 1px solid #000;
			color: #7777AA;
			padding: 8px;
			font-family: courier new;
			width: 100%;
			height: 48%;
		}
    </style>
</head>
<body ng-app="myLogic" ng-controller="textController">
<div id="mynetwork"></div>
<textarea class="myterminal" name="w3review" value="Hey">
</textarea>
<script type="text/javascript">
    // create an array with nodes
    var nodes = new vis.DataSet([
        {id: 'Node 1', label: 'Node 1'},
        {id: 'Node 2', label: 'Node 2'},
        {id: 'Node 3', label: 'Node 3'},
        {id: 'Node 4', label: 'Node 4'},
        {id: 'Node 5', label: 'Node 5'}
    ]);

    // create an array with edges
    var edges = new vis.DataSet([
        {from: 'Node 1', to: 'Node 3'},
        {from: 'Node 1', to: 'Node 2'},
        {from: 'Node 2', to: 'Node 4'},
        {from: 'Node 2', to: 'Node 5'}
    ]);

    // create a network
    var container = document.getElementById('mynetwork');

    // provide the data in the vis format
    var data = {
        nodes: nodes,
        edges: edges
    };

	// these are all options in full.
	var options = {
	  manipulation: {
		enabled: true,
		initiallyActive: false,
		addNode: function myFunction(nodeData,callback) {
					  nodeData.label = prompt("New name", "node");
					  if (nodeData.label != null) {
						  callback(nodeData);
					  }
					  access(nodeData.label);
				},
			  addEdge: function newEdge(edgeData,callback){ 
							edgeData.label= prompt("name");
							callback(edgeData);
					  },
		editNode: undefined,
		editEdge: true,
		deleteNode: true,
		deleteEdge: true,
		controlNodeStyle:{
		  // all node options are valid.
		}
	  }
	}


    // initialize your network!
    var network = new vis.Network(container, data, options);
	network.setOptions(options);
</script>
</body>
</html>
