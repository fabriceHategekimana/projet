<body>
<div id = "mynetwork"></div>


<script type="text/javascript">

    // initialize global variables.
    var edges;
    var nodes;
    var network; 
    var container;
    var options, data;

    
    // This method is responsible for drawing the graph, returns the drawn network
    function drawGraph() {
        var container = document.getElementById('mynetwork');
        
        

        // parsing and collecting nodes and edges from the python
        nodes = new vis.DataSet([{"font": {"color": "white"}, "id": "nouvelleConquete", "image": "https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fcommons%2Fthumb%2Fd%2Fd5%2FRond_bleu_ciel.png%2F120px-Rond_bleu_ciel.png\u0026f=1\u0026nofb=1", "label": "nouvelleConquete", "shape": "image"}, {"font": {"color": "white"}, "id": "C\u0027est", "image": "https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fcommons%2Fthumb%2Fd%2Fd5%2FRond_bleu_ciel.png%2F120px-Rond_bleu_ciel.png\u0026f=1\u0026nofb=1", "label": "C\u0027est", "shape": "image"}, {"font": {"color": "white"}, "id": "attaqueDeLAmbassade", "image": "https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fcommons%2Fthumb%2Fd%2Fd5%2FRond_bleu_ciel.png%2F120px-Rond_bleu_ciel.png\u0026f=1\u0026nofb=1", "label": "attaqueDeLAmbassade", "shape": "image"}, {"font": {"color": "white"}, "id": "orphelinat", "image": "https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fcommons%2Fthumb%2Fd%2Fd5%2FRond_bleu_ciel.png%2F120px-Rond_bleu_ciel.png\u0026f=1\u0026nofb=1", "label": "orphelinat", "shape": "image"}, {"font": {"color": "white"}, "id": "ecole", "image": "https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fcommons%2Fthumb%2Fd%2Fd5%2FRond_bleu_ciel.png%2F120px-Rond_bleu_ciel.png\u0026f=1\u0026nofb=1", "label": "ecole", "shape": "image"}, {"font": {"color": "white"}, "id": "ageDesMutants", "image": "https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fcommons%2Fthumb%2Fd%2Fd5%2FRond_bleu_ciel.png%2F120px-Rond_bleu_ciel.png\u0026f=1\u0026nofb=1", "label": "ageDesMutants", "shape": "image"}, {"font": {"color": "white"}, "id": "explorationDuGetho", "image": "https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fcommons%2Fthumb%2Fd%2Fd5%2FRond_bleu_ciel.png%2F120px-Rond_bleu_ciel.png\u0026f=1\u0026nofb=1", "label": "explorationDuGetho", "shape": "image"}, {"font": {"color": "white"}, "id": "heritage", "image": "https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fcommons%2Fthumb%2Fd%2Fd5%2FRond_bleu_ciel.png%2F120px-Rond_bleu_ciel.png\u0026f=1\u0026nofb=1", "label": "heritage", "shape": "image"}, {"font": {"color": "white"}, "id": "renversementDeLaMonarchie", "image": "https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fcommons%2Fthumb%2Fd%2Fd5%2FRond_bleu_ciel.png%2F120px-Rond_bleu_ciel.png\u0026f=1\u0026nofb=1", "label": "renversementDeLaMonarchie", "shape": "image"}, {"font": {"color": "white"}, "id": "event", "image": "https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fcommons%2Fthumb%2Fd%2Fd5%2FRond_bleu_ciel.png%2F120px-Rond_bleu_ciel.png\u0026f=1\u0026nofb=1", "label": "event", "shape": "image"}]);
        edges = new vis.DataSet([{"arrows": "to", "color": "#7ebe53", "from": "heritage", "label": "avant", "to": "ageDesMutants"}, {"arrows": "to", "color": "#7ebe53", "from": "heritage", "label": "avant", "to": "attaqueDeLAmbassade"}, {"arrows": "to", "color": "#7ebe53", "from": "heritage", "label": "avant", "to": "ecole"}, {"arrows": "to", "color": "#7ebe53", "from": "heritage", "label": "avant", "to": "explorationDuGetho"}, {"arrows": "to", "color": "#7ebe53", "from": "heritage", "label": "avant", "to": "nouvelleConquete"}, {"arrows": "to", "color": "#7ebe53", "from": "heritage", "label": "avant", "to": "orphelinat"}, {"arrows": "to", "color": "#7ebe53", "from": "heritage", "label": "avant", "to": "renversementDeLaMonarchie"}, {"arrows": "to", "color": "#c98b84", "from": "heritage", "label": "description", "to": "C\u0027est"}, {"arrows": "to", "color": "#839057", "from": "heritage", "label": "est", "to": "event"}, {"arrows": "to", "color": "#2a062", "from": "heritage", "label": "precede", "to": "orphelinat"}]);

        // adding nodes and edges to the graph
        data = {nodes: nodes, edges: edges};

        var options = {"manipulation": {"enabled": true}, "physics": {"enabled": false}, "interaction": {"multiselect": true, "navigationButtons": true}, "configure": {"enabled": true, "filter": "layout,physics", "showButton": true}, "edges": {"smooth": {"enabled": false}}};
        
        

        

        network = new vis.Network(container, data, options);
	 
        


        

        return network;

    }

    drawGraph();

</script>
